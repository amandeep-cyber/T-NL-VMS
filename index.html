<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VMS PRO - Frontend</title>
<style>
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;max-width:900px;margin:20px auto;padding:0 16px;color:#111}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  h1{font-size:20px;margin:0}
  .card{border:1px solid #e3e3e3;padding:12px;border-radius:8px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  label{display:block;font-size:13px;margin-top:8px}
  input,button,select,textarea{font-size:14px;padding:8px;border-radius:6px;border:1px solid #ddd;width:100%;box-sizing:border-box}
  button{cursor:pointer}
  #video{width:100%;max-height:360px;background:#000;border-radius:6px}
  .row{display:flex;gap:8px}
  .row > *{flex:1}
  .small{font-size:13px;color:#666}
  #progressBar{height:10px;background:#e6e6e6;border-radius:6px;overflow:hidden}
  #progressFill{height:100%;width:0;background:#2d9cdb}
  pre{background:#0f1724;color:#fff;padding:10px;border-radius:6px;overflow:auto}
</style>
</head>
<body>

<header>
  <h1>VMS PRO — Frontend</h1>
  <div class="small">Demo: Camera + Chunked upload</div>
</header>

<!-- CONFIG: set your Apps Script web app URL here -->
<script>
  const SCRIPT_URL = "https://script.google.com/a/macros/nilamind.com/s/AKfycbyjtL72R7iAsF4QbE9Q-WQlkimArEOO_mLA2_rDOZbfmoXVArkxlUsbGSjrkGxVzas1/exec"; // <-- REPLACE with your Apps Script web app URL
  // Chunk size in bytes (recommended 300KB - 800KB). Smaller = safer for Apps Script.
  const CHUNK_SIZE = 500 * 1024; // 500 KB
</script>

<!-- LOGIN / AUTH -->
<section class="card" id="loginCard">
  <h3>Login</h3>
  <label>Username</label><input id="username" placeholder="username" />
  <label>Password</label><input id="password" type="password" placeholder="password" />
  <div style="margin-top:10px" class="row">
    <button id="btnLogin">Login</button>
    <button id="btnLogout" style="display:none">Logout</button>
  </div>
  <div id="loginMsg" class="small"></div>
</section>

<!-- AWB Check -->
<section class="card">
  <h3>AWB Check</h3>
  <div class="row">
    <input id="awbInput" placeholder="enter AWB to check (e.g. AWB12345)" />
    <button id="btnAwb">Check AWB</button>
  </div>
  <div id="awbResult" class="small"></div>
</section>

<!-- Camera & Recording -->
<section class="card">
  <h3>Camera & Recording</h3>
  <video id="video" autoplay playsinline></video>
  <div class="row" style="margin-top:8px">
    <button id="btnStartRec">Start Recording</button>
    <button id="btnStopRec" disabled>Stop</button>
  </div>

  <label>AWB for this video (optional)</label>
  <input id="videoAwb" placeholder="optional awb for this recording" />

  <div style="margin-top:8px" class="small">After recording, the video will be split into chunks and uploaded to the Google Apps Script backend.</div>

  <div style="margin-top:10px">
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="uploadStatus" class="small"></div>
  </div>
</section>

<!-- Finalize + Metadata -->
<section class="card">
  <h3>Finalize / Last Actions</h3>
  <div class="row">
    <button id="btnFinalize" disabled>Finalize Upload</button>
    <button id="btnGetStats">Refresh Stats & Leaderboard</button>
  </div>
</section>

<!-- Stats / Leaderboard -->
<section class="card">
  <h3>Stats</h3>
  <div id="statsBox" class="small">No data yet.</div>
  <h4 style="margin-top:8px">Leaderboard</h4>
  <div id="leaderboardBox" class="small">No data yet.</div>
</section>

<!-- Debug -->
<section class="card">
  <h3>Debug / Last Response</h3>
  <pre id="debug"></pre>
</section>

<script>
/* ----------------- Utility ----------------- */
function debug(v){ document.getElementById('debug').textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2); }
function setUploadProgress(p){ document.getElementById('progressFill').style.width = (p*100) + '%'; }
function showMsg(id, txt){ document.getElementById(id).textContent = txt; }

/* ----------------- Auth ----------------- */
let TOKEN = localStorage.getItem('vms_token') || null;
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');
const btnLogin = document.getElementById('btnLogin');
const btnLogout = document.getElementById('btnLogout');

function saveToken(token){
  TOKEN = token;
  if(token) localStorage.setItem('vms_token', token); else localStorage.removeItem('vms_token');
  document.getElementById('btnLogout').style.display = token ? 'inline-block' : 'none';
}

async function apiPost(params){
  // Send as application/x-www-form-urlencoded to avoid preflight
  const body = new URLSearchParams();
  for(const k in params){
    const v = params[k];
    body.append(k, (typeof v === 'object') ? JSON.stringify(v) : String(v));
  }
  const resp = await fetch(SCRIPT_URL, { method:'POST', body });
  const text = await resp.text();
  try{ return JSON.parse(text); } catch(e){ return { status:'error', message:'invalid JSON', raw:text }; }
}

btnLogin.onclick = async ()=>{
  const u = usernameInput.value.trim(), p = passwordInput.value.trim();
  if(!u||!p){ showMsg('loginMsg','username & password required'); return; }
  showMsg('loginMsg','logging in...');
  const res = await apiPost({ action:'login', username:u, password:p });
  debug(res);
  if(res && res.status==='success'){
    saveToken(res.token);
    showMsg('loginMsg','Logged in as '+res.username+' ('+res.role+')');
    btnLogout.style.display = 'inline-block';
  } else {
    showMsg('loginMsg', res.message || 'Login failed');
  }
};

btnLogout.onclick = ()=>{ saveToken(null); showMsg('loginMsg','Logged out'); };

/* ----------------- AWB Check ----------------- */
document.getElementById('btnAwb').onclick = async ()=>{
  const awb = document.getElementById('awbInput').value.trim();
  if(!awb){ showMsg('awbResult','Enter AWB'); return; }
  const res = await apiPost({ action:'checkAwb', q: awb, awb });
  debug(res);
  showMsg('awbResult', res.exists ? 'AWB already exists (duplicate)' : 'AWB is new');
};

/* ----------------- Camera & Recording ----------------- */
const videoEl = document.getElementById('video');
let mediaStream = null, mediaRecorder = null, recordedChunks = [];

async function startCamera(){
  try{
    mediaStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
    videoEl.srcObject = mediaStream;
  }catch(err){
    alert("Camera access failed: " + err.message);
  }
}
startCamera();

document.getElementById('btnStartRec').onclick = ()=>{
  if(!mediaStream){ alert('No camera'); return; }
  recordedChunks = [];
  mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'video/webm;codecs=vp8,opus' });
  mediaRecorder.ondataavailable = e => { if(e.data && e.data.size>0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = onRecordingStop;
  mediaRecorder.start();
  document.getElementById('btnStartRec').disabled = true;
  document.getElementById('btnStopRec').disabled = false;
  showMsg('uploadStatus','Recording...');
  setUploadProgress(0);
};

document.getElementById('btnStopRec').onclick = ()=>{
  if(mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  document.getElementById('btnStartRec').disabled = false;
  document.getElementById('btnStopRec').disabled = true;
};

let lastUploadId = null;
async function onRecordingStop(){
  showMsg('uploadStatus','Recording stopped. Preparing upload...');
  const blob = new Blob(recordedChunks, { type: 'video/webm' });
  const startTime = new Date().toISOString();
  // split blob into slices
  const totalSize = blob.size;
  const slices = [];
  let offset = 0, index = 0;
  while(offset < totalSize){
    const end = Math.min(offset + CHUNK_SIZE, totalSize);
    slices.push({ index: index++, blob: blob.slice(offset, end) });
    offset = end;
  }

  // create unique uploadId
  const uploadId = 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2,9);
  lastUploadId = uploadId;

  // send slices sequentially
  for(let i=0;i<slices.length;i++){
    const s = slices[i];
    showMsg('uploadStatus', `Uploading chunk ${i+1}/${slices.length} ...`);
    setUploadProgress(i/slices.length);
    // convert slice to base64 via FileReader and then send as URLSearchParams (no preflight)
    await sendSliceAsBase64(uploadId, s.blob, s.index);
  }
  setUploadProgress(1);
  showMsg('uploadStatus', 'All chunks uploaded. Call Finalize to merge and save.');
  document.getElementById('btnFinalize').disabled = false;

  // store start/end candidate times for finalize
  // we'll set endTime to now when finalizing
  window._last_upload_meta = { uploadId, filename: `video_${Date.now()}.webm`, awb:document.getElementById('videoAwb').value.trim(), startTime };
  debug({ message:'Uploaded slices', uploadId, slicesCount: slices.length, size: totalSize });
}

function readBlobAsBase64(blob){
  return new Promise((resolve, reject)=>{
    const fr = new FileReader();
    fr.onloadend = ()=> resolve(fr.result.split(',')[1]); // data:*/*;base64,XXXX
    fr.onerror = reject;
    fr.readAsDataURL(blob);
  });
}

async function sendSliceAsBase64(uploadId, blobSlice, index){
  // read as base64
  const b64 = await readBlobAsBase64(blobSlice);
  // prepare URLSearchParams (application/x-www-form-urlencoded) => no preflight
  const params = new URLSearchParams();
  params.append('action','uploadChunk');
  params.append('uploadId', uploadId);
  params.append('index', String(index));
  params.append('data', b64);
  if(TOKEN) params.append('token', TOKEN);

  // POST
  const resp = await fetch(SCRIPT_URL, { method: 'POST', body: params });
  const txt = await resp.text();
  let json;
  try{ json = JSON.parse(txt); } catch(e){ json = { status:'error', message:'Invalid JSON', raw:txt }; }
  debug(json);
  if(!json || json.status !== 'ok') {
    throw new Error('Chunk upload failed: ' + (json && json.message ? json.message : JSON.stringify(json)));
  }
  return json;
}

/* ----------------- Finalize Upload ----------------- */
document.getElementById('btnFinalize').onclick = async ()=>{
  if(!window._last_upload_meta){ alert('No upload in progress'); return; }
  const meta = window._last_upload_meta;
  const endTime = new Date().toISOString();
  const params = new URLSearchParams();
  params.append('action','finalizeUpload');
  params.append('uploadId', meta.uploadId);
  params.append('filename', meta.filename);
  params.append('awb', meta.awb || '');
  params.append('startTime', meta.startTime);
  params.append('endTime', endTime);
  if(TOKEN) params.append('token', TOKEN);

  showMsg('uploadStatus','Finalizing upload...');
  const res = await fetch(SCRIPT_URL, { method:'POST', body: params });
  const text = await res.text();
  let json;
  try{ json = JSON.parse(text); } catch(e){ json = { status:'error', message:'Invalid JSON', raw:text }; }
  debug(json);
  if(json && json.status === 'success'){
    showMsg('uploadStatus','Upload finalized: ' + json.filename);
    // reset
    document.getElementById('btnFinalize').disabled = true;
    window._last_upload_meta = null;
    // refresh stats
    await loadStatsAndLeaderboard();
  } else {
    showMsg('uploadStatus','Finalize failed: ' + (json && json.message ? json.message : 'unknown'));
  }
};

/* ----------------- Stats & Leaderboard ----------------- */
async function loadStatsAndLeaderboard(){
  // stats
  const statRes = await apiPost({ action:'getStats', token: TOKEN || '' });
  debug(statRes);
  if(statRes && statRes.packedToday !== undefined){
    showMsg('statsBox', `Packed Today: ${statRes.packedToday}\nAWBs Processed: ${statRes.awbsProcessed}\nActive Uploads: ${statRes.activeUploads}`);
  } else {
    showMsg('statsBox', JSON.stringify(statRes));
  }

  // leaderboard
  const lbRes = await apiPost({ action:'getLeaderboard', token: TOKEN || '' });
  if(lbRes && lbRes.status === 'success'){
    const rows = lbRes.leaderboard.map(r => `${r.employee}: ${r.count}`).join('\n');
    showMsg('leaderboardBox', rows || 'No entries');
  } else {
    showMsg('leaderboardBox', JSON.stringify(lbRes));
  }
}
document.getElementById('btnGetStats').onclick = loadStatsAndLeaderboard;

/* ----------------- Init ----------------- */
(function init(){
  if(TOKEN) showMsg('loginMsg','Token stored. You are logged in.');
  else showMsg('loginMsg','Not logged in.');
  document.getElementById('btnLogout').style.display = TOKEN ? 'inline-block' : 'none';
  setUploadProgress(0);
  loadStatsAndLeaderboard().catch(()=>{});
})();
</script>
</body>
</html>
